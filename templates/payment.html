{% extends 'base.html' %}
{% block content %}
<div class="all-title bg-success">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <h2>Payment</h2>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a href="{% url 'home' %}">Home</a></li>
                        <li class="breadcrumb-item active">ABOUT US</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
<div class="container w-50 border border-3 shadow mt-5 p-5 mb-5 text-center">
    {% if payment %}
<form action="{% url 'cart:paymentsuccess' %}" method="POST">
<script
   src="https://checkout.razorpay.com/v1/checkout.js"
    data-key="rzp_test_T6IP07TeCheda2"
    data-amount={{payment.amount}}
    data-currency="INR"
    data-order_id={{payment.id}}
    data-buttontext="Pay with Razorpay"
    data-name="Acme Corp"
    data-description="A Wild Sheep Chase is the third novel by Japanese author Haruki Murakami"
    data-image="https://example.com/your_logo.jpg"
    data-prefill.name={{user.username}}
    data-prefill.email="gaurav.kumar@example.com"
    data-theme.color="#F37254"
></script>
<input type="hidden" custom="Hidden Element" name="hidden"/>
</form>
    {% else %}
    <h4>Your order is placed successfully</h4>
    <a href="{% url 'home' %}" class="btn btn-danger">Go to home</a>
    {% endif %}
    </div>

{% endblock %}
