{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div class="all-title bg-success">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <h2>Add Category</h2>
                    <ul class="breadcrumb">
                        <li class="breadcrumb-item"><a href="{% url 'home'%}">Home</a></li>
                        <li class="breadcrumb-item active">Add category</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
    <!-- End All Title Box -->
<div class="container p-5 mb-3">

    {% if form %}
    <form method="post" enctype="multipart/form-data">
        {% csrf_token%}
    {{form|crispy}}
        <div class="mb-3 mt-3">
    <input type="submit" class="btn btn-outline-dark">
        </div>
    </form>
{% endif %}
</div>
{% endblock %}
