{% extends 'base.html' %}
{% block content %}
<div class="container-fluid mt-3 w-100">
    <img src="{{categories.image.url}}" height="600px" width="100%">
</div>
<div class="products-box">
        <div class="container">
            <div class="row">
                <div class="col-lg-12">
                    <div class="title-all text-center">
                        <h1>{{categories.name}}</h1>
                        <p>{{categories.description}}</p>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-lg-12">
                </div>
            </div>

            <div class="row special-list">
                 {% for i in categories.products.all %}
                <div class="col-lg-3 col-md-6 special-grid best-seller mb-5 mt-3">
                    <div class="products-single fix">

                        <div class="box-img-hover">

                            <img src="{{ i.image.url }}" class="" alt="Image" height="330px" width="100%">
                            <div class="mask-icon">


                            </div>
                        </div>
                        <div class="why-text">
                            <h4>{{i.name}}</h4>
                            <h5>₹{{i.price}}</h5>
                            <a class="btn btn-danger" href="{% url 'shop:productdetail' i.id%}"> More Details</a>
                            <a class="btn btn-danger" href="{% url 'cart:addtocart' i.id %}"> Add to Cart</a>
                        </div>

                    </div>

                </div>

            {% endfor %}
                    </div>
                </div>
            </div>

{% endblock %}
